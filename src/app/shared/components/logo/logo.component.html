<div class="logo" [class]="'logo-' + getSizeClass()">
  @if (isLoading()) {
    <div class="logo-loading">
      <svg class="spinner" xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle class="path" cx="12" cy="12" r="10" stroke-dasharray="60" stroke-dashoffset="60"/>
      </svg>
    </div>
  } @else if (error()) {
    <div class="logo-error">
      <span>{{ error() }}</span>
    </div>
  } @else {
    <div class="logo-svg" [innerHTML]="safeSvg()"></div>
    @if (showTitle()) {
      <div class="logo-title" [class]="getTitleSizeClass()">
        <span>IconGener</span>
      </div>
    }
  }
</div>
